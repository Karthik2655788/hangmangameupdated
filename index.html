<!DOCTYPE html>
<html>
<head>
<title>Hangman Multi-Word Puzzle</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎮 Hangman Multi-Word Puzzle</h1>

<div id="hangman-container">
  <div class="hangman-part part1"></div>
  <div class="hangman-part part2"></div>
  <div class="hangman-part part3"></div>
  <div class="hangman-part part4"></div>
  <div class="hangman-part part5"></div>
  <div class="hangman-part part6"></div>
  <div class="hangman-part part7"></div>
</div>

<div id="grid"></div>

<div class="controls">
<input type="text" id="letter" maxlength="1" placeholder="A">
<button onclick="guess()">Guess</button>
</div>

<p id="message"></p>

<script src="script.js"></script>
</body>
</html>
